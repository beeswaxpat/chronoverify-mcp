name: Publish to MCP Registry

# Publishes server.json to the official MCP Registry (registry.modelcontextprotocol.io)
# using GitHub OIDC: no secrets, no browser, no binary on a dev machine. The OIDC
# token proves this repo's identity, which authorizes the io.github.beeswaxpat/*
# namespace that server.json's name uses. The npm package is published separately
# (npm publish), so this workflow only does the registry step.
#
# Trigger: push a version tag (git tag v0.1.3 && git push origin v0.1.3), or run
# it manually from the Actions tab / `gh workflow run publish-mcp.yml`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to MCP Registry
        run: ./mcp-publisher publish
